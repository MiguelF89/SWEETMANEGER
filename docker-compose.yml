version: '3.8'

services:
  app:
    image: php:8.3-cli
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./LARAVEL:/var/www
    ports:
      - "8000:8000"
    command: sh -c "apt update && apt install -y unzip git curl libzip-dev zip libxml2-dev && docker-php-ext-install pdo pdo_mysql xml && tail -f /dev/null"

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root